<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Andro System Console</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">

</head>

<body>

<header class="header">
  <h1>ANDRO SYSTEM CONSOLE</h1>
</header>

<main class="dashboard">

  <section class="panel status">
    <h2>System Status</h2>
  </section>

  <section class="panel graph">
    <h2>System Graph</h2>
  </section>

  <section class="panel logs">
    <h2>Logs</h2>
    <div id="log-container"></div>
  </section>

  <section class="panel services">
    <h2>Services</h2>
    <div id="services"></div>
  </section>

</main>

<script src="js/main.js"></script>

</body>
</html>
